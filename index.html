<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sentinel – Sensor Intelligence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="app-header">
  <h1>Sentinel</h1>
</header>

<h2>📊 Sentinel – Sensor Intelligence</h2>

<div class="controls">
  <select id="sensorType">
    <option value="">Select Sensor</option>
    <option value="battery">Battery Consumption Analysis</option>
    <option value="wifi">WiFi Quality</option>
    <option value="mobile">Phone Internet Speed</option>
  </select>

  <button onclick="runAnalysis()">Run Analysis</button>
</div>

<div id="countdown" class="countdown hidden"></div>

<div class="dashboard" style="display:none;">

  <canvas id="chart" style="height:260px;"></canvas>

  <div id="speedSection" style="display:none; text-align:center; margin-top:20px;">
    
    <canvas id="speedGauge" style="height:220px;"></canvas>

    <div id="speedValue"
         style="font-size:22px;
                font-weight:600;
                margin-top:10px;
                color:#2563eb;">
      0 Mbps
    </div>

  </div>

  <table class="metrics">
    <tr>
      <th>Metric</th>
      <th>Value</th>
    </tr>
    <tr>
      <td id="lStatus">–</td>
      <td id="mStatus">–</td>
    </tr>
    <tr>
      <td id="lConfidence">–</td>
      <td id="mConfidence">–</td>
    </tr>
    <tr>
      <td id="lHealth">–</td>
      <td id="mHealth">–</td>
    </tr>
  </table>

</div>

<div id="summary" class="summary hidden"></div>

<script src="./app.js"></script>

</body>
</html>
